name: Sync KBTVPRO to All-FREE-TV

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        run: |
          pip install requests pytz

      - name: Run Bot
        env:
          KBTVPRO: ${{ secrets.KBTVPRO }}
        run: python bot.py

      - name: Push to Target Repo
        env:
          MY_TOKEN: ${{ secrets.MY_PAT_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # টার্গেট রিপোজিটরি (All-FREE-TV) ক্লোন করা
          git clone https://${MY_TOKEN}@github.com/Mrbotrx/All-FREE-TV.git target_repo
          
          if [ -f combined_playlist.m3u ]; then
            cp combined_playlist.m3u target_repo/
            cd target_repo
            
            git add combined_playlist.m3u
            git commit -m "Auto Sync KBTVPRO: $(date +'%Y-%m-%d %H:%M')" || exit 0
            git push origin main --force
          else
            echo "Error: Playlist file not found!"
            exit 1
          fi
          # তৈরি হওয়া ফাইলটি টার্গেট ফোল্ডারে কপি করা
          if [ -f combined_playlist.m3u ]; then
            cp combined_playlist.m3u target_repo/
            cd target_repo
            
            # পরিবর্তন থাকলে পুশ করা
            git add combined_playlist.m3u
            git commit -m "Auto Sync: $(date +'%Y-%m-%d %H:%M')" || exit 0
            git push origin main --force
          else
            echo "Error: Playlist file not found!"
            exit 1
          fi
