name: Auto Sync KBTVPRO

on:
workflow_dispatch:

schedule:
- cron: "*/30 * * * *"

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install requests pytz

  - name: Run Bot
    env:
      KBTVPRO1: ${{ secrets.KBTVPRO1 }}
      KBTVPRO2: ${{ secrets.KBTVPRO2 }}
      KBTVPRO3: ${{ secrets.KBTVPRO3 }}
    run: |
      python bot.py

  - name: Commit Changes
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions[bot]@users.noreply.github.com"

      git add .

      git diff --staged --quiet || git commit -m "Auto Sync: $(date '+%Y-%m-%d %H:%M')"

  - name: Push Changes
    run: |
      git push origin main
